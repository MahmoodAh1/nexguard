name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.26"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy

      - name: Tests (pytest + coverage)
        run: uv run pytest -q --cov=nexguard --cov-report=term-missing

  frontend:
    name: Frontend (vitest · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (vitest)
        run: npm run test

      - name: Production build (type-checks)
        run: npm run build

  security:
    name: Security (secrets · deps audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.26"

      - name: Python dependency audit (advisory)
        working-directory: backend
        run: uv run pip-audit --progress-spinner off || true

      - name: Node dependency audit (advisory)
        working-directory: frontend
        run: npm audit --audit-level=high || true

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.26"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv python install 3.12

      - name: Seed backend + start API
        working-directory: backend
        run: |
          uv sync --frozen
          uv run nexguard seed
          nohup uv run nexguard serve > api.log 2>&1 &
          for i in $(seq 1 40); do curl -sf http://localhost:8000/health && break; sleep 2; done

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build + start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          npm ci
          npm run build
          nohup npm run start > web.log 2>&1 &
          for i in $(seq 1 40); do curl -sf http://localhost:3000/login && break; sleep 2; done

      - name: Run Playwright
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium
          npm run e2e

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

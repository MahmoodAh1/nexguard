# Railway service config for the NexGuard backend (config-as-code).
# Railway reads this from the deploy root (backend/). Mirrors the render.yaml
# blueprint and docker-compose so every target builds the same image.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Serve on 8000 (the image EXPOSEs 8000; literal port so no shell is needed).
# Migrations and demo data are applied once out-of-band against the database
# (see docs/DEPLOYMENT.md), so boot needs no DB connection and /health is fast.
startCommand = "nexguard serve --port 8000"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
